# About Section
about_profile_image: assets/profile.jpg
about_content: |
  I'm a Production Engineer with over a decade of experience building and scaling large-scale infrastructure, disaster recovery systems, and release engineering tooling. At Meta I've led efforts saving $20M annually in server capex, reduced end-to-end failover times from 80 minutes to 5 minutes, and driven release engineering practices that cut p90 binary age in production from 70 days to 5 days — all while maintaining reliability at fleet scale.

  Through my work with [TEALS](https://tealsk12.org) I've developed coaching techniques I bring directly to my engineering teams. I lead by example, with authenticity and transparency, and frequently solicit feedback from the people I support.

  **Core Skills & Technologies**
  - **Languages:** Python, Rust, C++, Java, JavaScript/TypeScript, PHP/Hack, Objective-C
  - **Infrastructure & Systems:** Distributed Systems Architecture, Capacity Engineering, Disaster Recovery Automation, Kubernetes/Mesos, Apache Spark
  - **Reliability:** Service Excellence (SLOs/SLIs), Incident Management, Automated Canary/Rollout Strategies, Progressive Delivery

content:
  - title: Experience
    layout: list
    content:
      - layout: left
        title: Meta Platforms
        sub_title: Production Engineer
        caption: January 2019 - Present
        description: |
          **Release Integrity Lead**
          - Reduced p90 production binary age from 70 days to 5 days with zero SLO misses and a sub-10% corrective action ratio throughout.
          - Prevented previously undetectable silent data corruption by automatically blocking a regression release.
          - Accelerated release validation signals and improved cluster efficiency by designing and building Fulcrum, a solver layer for SEF that dynamically shifted 2% of traffic from overutilized to underutilized clusters.
          - Scaled deferred correctness validations (checksum, partition latency, delta merge) across 4 products.
          - Designed and implemented SEF, a scenario framework enabling engineers to rapidly and easily onboard new validation scenarios.

          **Global Tetris and Disaster Recovery Lead**
          - Eliminated 240 PB of excess backfill by collaborating with the replication team.
          - Reduced end-to-end failover time from 80 minutes to 5 minutes using a modernized workflow implementation.
          - Increased DR storm cadence from quarterly to weekly by leveraging automated workflows.
          - Fully automated disaster workflow by developing and deploying a location-availability aware regional PinStore using Manifold blob storage.
          - Prevented a major outage due to DR storms by leading a month-long sprint to eliminate 99% of work for Multi-Region namespaces.
          - Reduced SLO misses from DR drills to 0 (from 4 per half) and reduced unneeded work for Multi-Region drain/undrain by 53-78%.
          - Designed and built a symmetric API for DR execution, simplifying execution and improving reliability of key tooling.
          - Validated capacity requirements for 10 batches of initial migrations, facilitating the split of the largest ads namespace (critical to revenue) across 3 datacenter regions.
          - Corrected cost forecasting for 15-minute partitions, resulting in 75% more accurate cost estimates.

          **Capacity Roadmap Owner**
          - Saved $20M annually in server capex and reduced regional capacity variance by 5% by designing and building bulk cluster automation tooling.
          - Reduced over-ordering by 50+ racks and cut quarterly dev effort from 2-3 days to ~2 hours by integrating FBETL with Warehouse capacity planner.
          - Created foundational pillar and 3-year capacity vision, driving roadmap planning across multiple halves.
          - Built distributed scheduler exclusion lock, preventing control plane duplication and reliability risks.

          **Better Engineering Lead**
          - Contributed to a >85% task closure rate within 30 days org-wide by forming and leading a teamwide SEV committee, reducing the followup backlog age from 150 days to 20 days.
          - Saved hundreds of engineering hours by reducing primary CLI cold start times by 60-70%.
          - Consistently cut build/test flakiness by 30-40% every 6 months.
          - Built and rolled out OS stats-based health check framework to DIMS (global ingestion control plane).
          - Reduced p99 latency by 50% on DIMS and automated heap dump collection on FULLGC events.
          - Eliminated a major cause of oncall pain by reducing push failures from 70% to 5%.
          - Drove C++ from a production readiness perspective, launching with instance health checks, capacity attribution, continuous push, and integration testing.

          > "Tyler played a critical role in multiple SEV mitigations regardless of whether he was oncall. His dedication, prompt response, and generosity to offer help are deeply valued." — Peer feedback

          > "Tyler is core to the success of the DI PE Team. His curiosity about Meta systems and willingness to jump on any task has lent him extensive knowledge on just about every aspect of FbETL and related systems." — Peer feedback

